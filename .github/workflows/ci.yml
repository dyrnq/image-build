name: ci

on:
  # push:
  #   branches:
  #     - '!main'
  #   tags:
  #     - '*'
  schedule:
    - cron:  '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
        fail-fast: false
        matrix:
          repo:
          - "https://gitee.com/dyrnq/apisixWeb.git"
          - "https://gitee.com/dyrnq/bdcm.git"
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true
          
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      -
        name: Checkout
        uses: actions/checkout@v4
      # - name: Get version
      #   id: get_version
      #   run: echo ::set-output name=VERSION::${GITHUB_REF/refs\/tags\//}
      # - name: Test version
      #   run: |
      #     echo ${{ steps.get_version.outputs.VERSION }}
      #     echo ${{ github.ref }}
      -
        name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Inspect builder
        run: |
          echo "Name:      ${{ steps.buildx.outputs.name }}"
          echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
          echo "Status:    ${{ steps.buildx.outputs.status }}"
          echo "Flags:     ${{ steps.buildx.outputs.flags }}"
          echo "Platforms: ${{ steps.buildx.outputs.platforms }}"
      - name: clone
        run: |
          repo=${{ matrix.repo }}
          git clone --depth 1 "${{ matrix.repo }}" __directory
      - name: Build dockerfile (with not push)
        run: |
          repo=${{ matrix.repo }}
          pushd __directory || exit 1
          if grep "apisix" <<< "${repo}"; then
            ./buildx.sh --push false --repo ${{ secrets.DOCKER_USERNAME }} --image-name apisixweb --base eclipse-temurin:21-jre-noble
            ./buildx.sh --push false --repo ${{ secrets.DOCKER_USERNAME }} --image-name apisixweb --base eclipse-temurin:21-jdk-noble
          fi
          if grep "bdcm" <<< "${repo}"; then
            ./buildx.sh --push false --repo ${{ secrets.DOCKER_USERNAME }} --image-name bdcm --base eclipse-temurin:21-jdk-noble
          fi
          popd || exit 1

      -
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build dockerfile (with push)
        run: |

          repo=${{ matrix.repo }}
          pushd __directory || exit 1
          if grep "apisix" <<< "${repo}"; then
            ./buildx.sh --push true --repo ${{ secrets.DOCKER_USERNAME }} --image-name apisixweb --base eclipse-temurin:21-jre-noble
            ./buildx.sh --push true --repo ${{ secrets.DOCKER_USERNAME }} --image-name apisixweb --base eclipse-temurin:21-jdk-noble
          fi
          if grep "bdcm" <<< "${repo}"; then
            ./buildx.sh --push true --repo ${{ secrets.DOCKER_USERNAME }} --image-name bdcm --base eclipse-temurin:21-jdk-noble
          fi
          popd || exit 1